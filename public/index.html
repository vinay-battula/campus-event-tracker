<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Login — CampusEvents</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #0a0a2e 0%,
          #1a0050 40%,
          #0d0d40 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        /* Allow scrolling on small screens */
        overflow-y: auto;
        padding: 20px 0;
        position: relative;
      }
      /* ANIMATED BG PARTICLES */
      .particles {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .particle {
        position: absolute;
        border-radius: 50%;
        animation: float linear infinite;
        opacity: 0.15;
      }
      @keyframes float {
        0% {
          transform: translateY(100vh) rotate(0deg);
        }
        100% {
          transform: translateY(-100px) rotate(720deg);
        }
      }

      /* 3D CARD */
      .auth-container {
        perspective: 1000px;
        width: 95%;
        max-width: 460px;
        z-index: 1;
      }
      .auth-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 24px;
        padding: 40px 30px;
        transform-style: preserve-3d;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        position: relative;
      }

      .logo {
        text-align: center;
        margin-bottom: 25px;
      }
      .logo-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #6a0dad, #1a1a6e);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        margin: 0 auto 12px;
        box-shadow: 0 8px 25px rgba(106, 13, 173, 0.5);
      }
      .logo h2 {
        color: white;
        font-size: 1.5rem;
        font-weight: 800;
      }
      .logo p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.85rem;
      }

      .tabs {
        display: flex;
        gap: 4px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 4px;
        margin-bottom: 24px;
      }
      .tab {
        flex: 1;
        padding: 10px;
        text-align: center;
        border-radius: 10px;
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 600;
        transition: 0.3s;
        border: none;
        background: none;
      }
      .tab.active {
        background: linear-gradient(135deg, #6a0dad, #1a1a6e);
        color: white;
        box-shadow: 0 4px 15px rgba(106, 13, 173, 0.4);
      }

      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.8rem;
        margin-bottom: 6px;
      }
      .input-wrap {
        position: relative;
      }
      .input-wrap .icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1rem;
        opacity: 0.6;
      }
      .form-group input {
        width: 100%;
        padding: 12px 14px 12px 42px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        color: white;
        font-size: 0.9rem;
        outline: none;
      }
      .form-group input:focus {
        border-color: #6a0dad;
        background: rgba(255, 255, 255, 0.12);
      }

      .btn-auth {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #6a0dad, #1a1a6e);
        color: white;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
      }
      .btn-auth:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
      }
      .btn-auth:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .alert {
        padding: 12px;
        border-radius: 10px;
        font-size: 0.85rem;
        margin-bottom: 15px;
        display: none;
      }
      .alert-error {
        background: rgba(231, 76, 60, 0.2);
        color: #ff6b6b;
        border: 1px solid #e74c3c44;
      }
      .alert-success {
        background: rgba(39, 174, 96, 0.2);
        color: #55efc4;
        border: 1px solid #27ae6044;
      }

      .admin-link {
        text-align: center;
        margin-top: 20px;
      }
      .admin-link a {
        color: #f9c74f;
        font-size: 0.85rem;
        text-decoration: none;
        opacity: 0.8;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 400px) {
        .form-row {
          grid-template-columns: 1fr;
        }
        .auth-card {
          padding: 30px 20px;
        }
      }

      /* Loading Spinner */
      .loading-spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 10px;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="particles" id="particles"></div>

    <div class="auth-container">
      <div class="auth-card">
        <div class="logo">
          <div class="logo-icon">🎓</div>
          <h2>CampusEvents</h2>
          <p>Connect · Discover · Participate</p>
        </div>

        <div class="tabs">
          <button
            class="tab active"
            id="loginTabBtn"
            onclick="showTab('login')"
          >
            🔐 Login
          </button>
          <button class="tab" id="regTabBtn" onclick="showTab('register')">
            📝 Register
          </button>
        </div>

        <div class="alert alert-error" id="alertError"></div>
        <div class="alert alert-success" id="alertSuccess"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrap">
              <span class="icon">📧</span>
              <input
                type="email"
                id="loginEmail"
                placeholder="your@email.com"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <span class="icon">🔒</span>
              <input
                type="password"
                id="loginPass"
                placeholder="Enter password"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn-auth" id="loginBtn">
            🚀 Login to CampusEvents
          </button>
        </form>

        <form
          id="registerForm"
          style="display: none"
          onsubmit="handleRegister(event)"
        >
          <div class="form-row">
            <div class="form-group">
              <label>Full Name *</label>
              <div class="input-wrap">
                <span class="icon">👤</span>
                <input
                  type="text"
                  id="regName"
                  placeholder="Your name"
                  required
                />
              </div>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <div class="input-wrap">
                <span class="icon">📱</span>
                <input type="tel" id="regPhone" placeholder="+91..." />
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <div class="input-wrap">
              <span class="icon">📧</span>
              <input
                type="email"
                id="regEmail"
                placeholder="your@email.com"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label>College Name *</label>
            <div class="input-wrap">
              <span class="icon">🏫</span>
              <input
                type="text"
                id="regCollege"
                placeholder="e.g. IIT Delhi"
                required
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Department</label>
              <div class="input-wrap">
                <span class="icon">📚</span>
                <input type="text" id="regDept" placeholder="e.g. CSE" />
              </div>
            </div>
            <div class="form-group">
              <label>Password *</label>
              <div class="input-wrap">
                <span class="icon">🔒</span>
                <input
                  type="password"
                  id="regPass"
                  placeholder="Min 6 chars"
                  required
                />
              </div>
            </div>
          </div>
          <button type="submit" class="btn-auth" id="regBtn">
            ✨ Create Account
          </button>
        </form>

        <div class="admin-link">
          <a href="admin.html">🛡️ Admin Panel →</a>
        </div>
      </div>
    </div>

    <script>
      // 1. PARTICLES ANIMATION
      (function () {
        const pContainer = document.getElementById("particles");
        const colors = ["#6a0dad", "#1a1a6e", "#f9c74f", "#e74c3c", "#3498db"];
        for (let i = 0; i < 20; i++) {
          const div = document.createElement("div");
          div.className = "particle";
          const size = Math.random() * 15 + 5;
          div.style.width = `${size}px`;
          div.style.height = `${size}px`;
          div.style.left = `${Math.random() * 100}%`;
          div.style.background =
            colors[Math.floor(Math.random() * colors.length)];
          div.style.animationDuration = `${Math.random() * 10 + 5}s`;
          div.style.animationDelay = `${Math.random() * 5}s`;
          pContainer.appendChild(div);
        }
      })();

      // 2. TAB SWITCHING
      function showTab(tab) {
        document
          .getElementById("loginTabBtn")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("regTabBtn")
          .classList.toggle("active", tab === "register");

        document.getElementById("loginForm").style.display =
          tab === "login" ? "block" : "none";
        document.getElementById("registerForm").style.display =
          tab === "register" ? "block" : "none";
        hideAlerts();
      }

      function showAlert(type, msg) {
        hideAlerts();
        const el = document.getElementById(
          type === "error" ? "alertError" : "alertSuccess",
        );
        el.textContent = msg;
        el.style.display = "block";
      }

      function hideAlerts() {
        document.getElementById("alertError").style.display = "none";
        document.getElementById("alertSuccess").style.display = "none";
      }

      // 3. AUTH LOGIC (With Mock Support)
      async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById("loginBtn");
        const originalText = btn.innerHTML;

        btn.innerHTML = `Logging in... <span class="loading-spinner"></span>`;
        btn.disabled = true;

        try {
          // NOTE: If you don't have a backend yet, this will fail.
          // I added a "MOCK" logic here for your testing:
          const email = document.getElementById("loginEmail").value;

          // TO USE REAL API: Uncomment the block below and remove the mock logic
          /*
          const res = await fetch("/api/auth/login", { ... });
          const data = await res.json();
          */

          // MOCK SUCCESS (Delete this when your backend is ready)
          setTimeout(() => {
            localStorage.setItem("token", "fake-jwt-token");
            showAlert("success", "✅ Success! Redirecting to dashboard...");
            setTimeout(() => (window.location.href = "dashboard.html"), 1200);
          }, 1000);
        } catch (err) {
          showAlert("error", "❌ Connection error. Is your server running?");
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      }

      async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById("regBtn");
        btn.disabled = true;
        btn.innerHTML = `Creating account... <span class="loading-spinner"></span>`;

        // Mock Registration
        setTimeout(() => {
          showAlert("success", "🎉 Account created! Please login.");
          btn.innerHTML = "✨ Create Account";
          btn.disabled = false;
          document.getElementById("registerForm").reset();
          setTimeout(() => showTab("login"), 2000);
        }, 1500);
      }

      // 4. CHECK LOGGED IN STATE
      if (localStorage.getItem("token")) {
         window.location.href = "dashboard.html"; // Uncomment to auto-redirect
      }
    </script>
  </body>
</html>
